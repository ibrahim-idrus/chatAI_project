name = "chatai-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
AI_MODEL = "gpt-4.1-nano"
AI_PROVIDER = "openai"
SYSTEM_PROMPT = "You are a helpful assistant."

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "a43063553af247229d0ee9c362e31bd3"
preview_id = "a43063553af247229d0ee9c362e31bd3"

# DO — ChatThreadDO menangani state thread secara terisolasi
[[durable_objects.bindings]]
name = "CHAT_THREAD_DO"
class_name = "ChatThreadDO"

[[migrations]]
tag = "v1"
new_classes = ["ChatThreadDO"]

# Queue — AI processing offloaded from DO to async worker
[[queues.consumers]]
queue = "ai_processing"
max_retries = 2

[[queues.producers]]
queue = "ai_processing"
binding = "AI_PROCESSING_QUEUE"

# Queue — Thread naming (auto-generate title from first message)
[[queues.consumers]]
queue = "thread_naming"
max_retries = 1

[[queues.producers]]
queue = "thread_naming"
binding = "THREAD_NAMING_QUEUE"
