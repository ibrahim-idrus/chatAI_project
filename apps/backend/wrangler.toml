name = "chatai-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSION_KV"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

[[queues.producers]]
binding = "LOG_QUEUE"
queue = "log-events-queue"

[[queues.consumers]]
queue = "log-events-queue"
max_batch_size = 100
max_batch_timeout = 5

[[analytics_engine_datasets]]
binding = "ANALYTICS"

[vars]
NODE_ENV = "production"

